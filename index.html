<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lie Detective – Subsystem 1 & 2 Test</title>

    <style>
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: #0D1117;
            color: #fff;
            margin: 0;
            padding: 24px;
        }

        .card {
            background: #181C23;
            border: 1px solid #232833;
            border-radius: 12px;
            padding: 16px;
            max-width: 700px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
            margin-bottom: 24px;
        }

        label {
            font-weight: 600;
            color: #B4B8C5;
        }

        select,
        button {
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #2A303C;
            background: #101726;
            color: #fff;
        }

        button {
            background: #FFCB3C;
            color: #0D0F14;
            border: none;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            filter: brightness(1.05);
        }

        .row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .mt-2 {
            margin-top: 12px;
        }

        .mt-3 {
            margin-top: 16px;
        }

        .ok {
            color: #3DE8A3;
            font-weight: 700;
        }

        .err {
            color: #FF5C77;
            font-weight: 700;
        }

        pre {
            background: #101726;
            padding: 12px;
            border-radius: 10px;
            max-height: 280px;
            overflow: auto;
        }

        .statement-btn {
            padding: 14px 18px;
            border-radius: 12px;
            background: #181C23;
            border: 1px solid #232833;
            color: #fff !important;
            text-align: left;
            cursor: pointer;
            min-height: 48px;
            font-size: 16px;
            line-height: 1.3;
            display: flex;
            align-items: center;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        .statement-btn:hover {
            filter: brightness(1.12);
            transform: translateY(-1px);
        }

        .statement-btn.correct {
            outline: 2px solid #3DE8A3;
            box-shadow: 0 0 10px rgba(61, 232, 163, 0.5);
        }

        .statement-btn.wrong {
            outline: 2px solid #FF5C77;
            box-shadow: 0 0 10px rgba(255, 92, 119, 0.5);
        }

        .statement-btn.dim-true {
            opacity: 0.8;
        }

        .statement-btn.locked {
            opacity: 0.6;
            pointer-events: none;
        }

        .status.ok {
            color: #3DE8A3 !important;
        }

        .status.err {
            color: #FF5C77 !important;
        }

        .status.warn {
            color: #FFB454 !important;
        }
    </style>
</head>

<body>

    <!-- ========== SUBSYSTEM 1 TEST UI ========== -->
    <div class="card">
        <h1>Lie Detective — Content Loader Test</h1>
        <p>Detective, load a case file to verify its structure.</p>

        <div class="row mt-2">
            <label for="packSelect">Pack:</label>
            <select id="packSelect">
                <option value="animals">Animals</option>
                <option value="celebrities">Celebrities</option>
                <option value="africa">Africa</option>
            </select>
            <button id="btnLoad">Load Pack</button>
        </div>

        <div id="status" class="mt-3"></div>
        <h3 class="mt-3">First Item (pretty-printed):</h3>
        <pre id="output">(nothing loaded yet)</pre>
    </div>

    <!-- ========== SUBSYSTEM 3 — PROFILE UI ========== -->
    <div class="card" style="margin-bottom:24px;">
        <h2>Your Detective Profile</h2>

        <label>Detective Name:</label><br>
        <input id="profileName" type="text" placeholder="Detective Name"
            style="width:100%; padding:10px; border-radius:8px; margin:6px 0; background:#101726; color:white; border:1px solid #232833;" />

        <p style="margin-top:12px;">Best Score: <b id="profileHighScore">0</b></p>
        <p>Best Streak: <b id="profileBestStreak">0</b></p>

        <button id="btnResetProfile"
            style="background:#FF5C77; color:white; margin-top:10px; padding:10px 14px; border-radius:10px;">
            Reset Profile
        </button>
        <button id="profileLoad">Load Player Profile</button>
        <button id="profileSave" style="margin-left:8px;">Save Profile</button>

    </div>


    <!-- ========== SUBSYSTEM 2 — GAME SCREEN ========== -->
    <section id="screen-game" class="screen">
        <div class="card">

            <h2 style="margin:0 0 8px 0;">
                Case <span id="caseNo">000</span> —
                <span id="packName">No Pack</span>
            </h2>

            <div class="hud" style="display:flex; gap:12px; align-items:center; margin:8px 0 12px;">
                <div id="timer" style="flex:1;">
                    <div id="timerTrack"
                        style="position:relative; height:10px; background:#232833; border-radius:8px; overflow:hidden;">
                        <div id="timerBar"
                            style="position:absolute; left:0; top:0; bottom:0; width:100%; background:#4F8CFF; transform-origin:left center; transform:scaleX(1);">
                        </div>
                    </div>
                    <div id="timerText" style="font-weight:600; color:#B4B8C5; margin-top:6px;">⏱ 8s</div>
                </div>

                <div class="stat" style="min-width:110px;">Score: <b id="scoreVal">0</b></div>
                <div class="stat" style="min-width:110px;">Streak: <b id="streakVal">0</b></div>
            </div>


            <div id="statements" style="display:grid; gap:10px;">
                <button class="statement-btn"></button>
                <button class="statement-btn"></button>
                <button class="statement-btn"></button>
            </div>


            <div class="controls" style="display:flex; gap:10px; margin-top:14px;">
                <button id="btnStartSession">Start Session</button>
                <button id="btnEndSession" style="background:#232833; color:#fff;">End</button>
                <span id="statusMsg" class="status" style="margin-left:auto; color:#B4B8C5;">Ready.</span>
            </div>


            <div id="summary" hidden
                style="margin-top:16px; background:#101726; border:1px solid #232833; border-radius:12px; padding:12px;">
                <h3 style="margin-top:0;">Case Report</h3>
                <pre id="summaryBody" style="white-space:pre-wrap; margin:0;"></pre>
                <div style="margin-top:10px; display:flex; gap:10px;">
                    <button id="btnSummaryRestart">Start New Session</button>
                </div>
            </div>

        </div>
    </section>



    <!-- ========== SCRIPT ORDER (CRITICAL) ========== -->

    <!--utils -->
    <script src="./js/utils.js"></script>

    <!-- Pack Loader -->
    <script src="./js/contentLoader.js"></script>

    <!-- Game Engine -->
    <script src="./js/game.js"></script>

    <!-- Storage (MUST come after game.js) -->
    <script src="./js/storage.js"></script>

    <!-- Main Profile Controller (MUST come after storage.js) -->
    <script src="./js/main.js"></script>

    <!-- Glue Code -->
    <script>
        (function () {
            const selectEl = document.getElementById('packSelect');
            const loadBtn = document.getElementById('btnLoad');
            const startBtn = document.getElementById('btnStartSession');

            let loadedPack = null;

            async function loadSelectedPack() {
                const name = selectEl?.value || 'animals';
                try {
                    loadedPack = await ContentLoader.loadPack(name);
                    console.log('[Game Test] Pack ready:', loadedPack.packName, loadedPack.items.length);

                    document.getElementById('packName').textContent = loadedPack.packName;
                    document.getElementById('statusMsg').textContent =
                        `Loaded '${loadedPack.packName}'. Press Start Session.`;
                } catch (e) {
                    console.error('[Game Test] Failed to load pack:', e);
                }
            }

            loadBtn?.addEventListener('click', loadSelectedPack);

            startBtn?.addEventListener('click', () => {
                if (!loadedPack) {
                    loadSelectedPack().then(() => {
                        if (loadedPack) GameEngine.startGame(loadedPack);
                    });
                } else {
                    GameEngine.startGame(loadedPack);
                }
            });
        })();
    </script>

</body>

</html>
