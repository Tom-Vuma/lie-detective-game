<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lie Detective – Subsystem 1 Test</title>
    <style>
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: #0D1117;
            color: #fff;
            margin: 0;
            padding: 24px;
        }

        .card {
            background: #181C23;
            border: 1px solid #232833;
            border-radius: 12px;
            padding: 16px;
            max-width: 700px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        }

        label {
            font-weight: 600;
            color: #B4B8C5;
        }

        select,
        button {
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #2A303C;
            background: #101726;
            color: #fff;
        }

        button {
            background: #FFCB3C;
            color: #0D0F14;
            border: none;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            filter: brightness(1.05);
        }

        .row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .mt-2 {
            margin-top: 12px;
        }

        .mt-3 {
            margin-top: 16px;
        }

        .ok {
            color: #3DE8A3;
            font-weight: 700;
        }

        .err {
            color: #FF5C77;
            font-weight: 700;
        }

        pre {
            background: #101726;
            padding: 12px;
            border-radius: 10px;
            max-height: 280px;
            overflow: auto;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Lie Detective — Content Loader Test</h1>
        <p>Detective, load a case file to verify its structure.</p>

        <div class="row mt-2">
            <label for="packSelect">Pack:</label>
            <select id="packSelect">
                <option value="animals">Animals</option>
                <option value="celebrities">Celebrities</option>
                <option value="africa">Africa</option>
            </select>
            <button id="btnLoad">Load Pack</button>
        </div>

        <div id="status" class="mt-3"></div>
        <h3 class="mt-3">First Item (pretty-printed):</h3>
        <pre id="output">(nothing loaded yet)</pre>
    </div>


    <!-- Utilities & Loader -->
    <script src="./js/utils.js"></script>
    <script src="./js/contentLoader.js"></script>


    <!-- Quick test script -->
    <script>
        const statusEl = document.getElementById('status');
        const outputEl = document.getElementById('output');
        const selectEl = document.getElementById('packSelect');
        const btn = document.getElementById('btnLoad');

        btn.addEventListener('click', async () => {
            const name = selectEl.value;
            statusEl.textContent = 'Loading...';
            outputEl.textContent = '(loading)';

            try {
                const pack = await ContentLoader.loadPack(name);
                statusEl.innerHTML = `<span class="ok">OK</span> Loaded '${pack.packName}' with <b>${pack.items.length}</b> items.`;
                const first = pack.items[0];
                outputEl.textContent = JSON.stringify(first, null, 2);
                console.log('[Test] First item:', first);

                // extra: quick sanity check for ALL items
                const bad = pack.items.filter((it) => {
                    const c = it.statements.filter(s => s.truth === false).length;
                    return c !== 1 || it.statements.length !== 3;
                });
                if (bad.length) {
                    statusEl.innerHTML += ` <span class="err">Found ${bad.length} invalid items!</span>`;
                }
            } catch (err) {
                statusEl.innerHTML = `<span class="err">Error</span> ${err?.message || err}`;
                outputEl.textContent = '(error)';
            }
        });
    </script>
</body>

</html>
